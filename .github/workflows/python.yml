name: Python

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build wheels - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build-args: --release --out dist -i python3.9
          - os: macos-latest
            build-args: --release --out dist
          - os: windows-latest
            build-args: --release --out dist
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python package version
        run: python scripts/sync_python_package_version.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: ${{ matrix.build-args }}
          sccache: true
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python package version
        run: python scripts/sync_python_package_version.py

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  smoke-install-linux:
    name: Smoke install Linux wheel - py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist

      - name: Install wheel
        run: python -m pip install dist/redis_enterprise-*.whl

      - name: Import package
        run: python -c "import redis_enterprise; print(redis_enterprise.__file__)"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist, smoke-install-linux]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
